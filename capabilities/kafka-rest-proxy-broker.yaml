naftiko: 1.0.0-alpha2
info:
  label: Confluent Kafka REST Proxy API — Broker
  description: 'Confluent Kafka REST Proxy API — Broker. 1 operations. Lead operation: Apache kafka List Brokers. Self-contained
    Naftiko capability covering one Apache Kafka business surface.'
  tags:
  - Apache Kafka
  - Broker
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_KAFKA_API_KEY: APACHE_KAFKA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kafka-rest-proxy-broker
    baseUri: http://localhost:8082
    description: Confluent Kafka REST Proxy API — Broker business capability. Self-contained, no shared references.
    resources:
    - name: clusters-cluster_id-brokers
      path: /clusters/{cluster_id}/brokers
      operations:
      - name: listbrokers
        method: GET
        description: Apache kafka List Brokers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cluster_id
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: kafka-rest-proxy-broker-rest
    port: 8080
    description: REST adapter for Confluent Kafka REST Proxy API — Broker. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/clusters/{cluster-id}/brokers
      name: clusters-cluster-id-brokers
      description: REST surface for clusters-cluster_id-brokers.
      operations:
      - method: GET
        name: listbrokers
        description: Apache kafka List Brokers
        call: kafka-rest-proxy-broker.listbrokers
        with:
          cluster_id: rest.cluster_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kafka-rest-proxy-broker-mcp
    port: 9090
    transport: http
    description: MCP adapter for Confluent Kafka REST Proxy API — Broker. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apache-kafka-list-brokers
      description: Apache kafka List Brokers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kafka-rest-proxy-broker.listbrokers
      with:
        cluster_id: tools.cluster_id
      outputParameters:
      - type: object
        mapping: $.
