naftiko: 1.0.0-alpha2
info:
  label: Confluent Kafka REST Proxy API — Partition
  description: 'Confluent Kafka REST Proxy API — Partition. 1 operations. Lead operation: Apache kafka List Partitions. Self-contained
    Naftiko capability covering one Apache Kafka business surface.'
  tags:
  - Apache Kafka
  - Partition
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_KAFKA_API_KEY: APACHE_KAFKA_API_KEY
capability:
  consumes:
  - type: http
    namespace: kafka-rest-proxy-partition
    baseUri: http://localhost:8082
    description: Confluent Kafka REST Proxy API — Partition business capability. Self-contained, no shared references.
    resources:
    - name: clusters-cluster_id-topics-topic_name-partitions
      path: /clusters/{cluster_id}/topics/{topic_name}/partitions
      operations:
      - name: listpartitions
        method: GET
        description: Apache kafka List Partitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cluster_id
          in: path
          type: string
          required: true
        - name: topic_name
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: kafka-rest-proxy-partition-rest
    port: 8080
    description: REST adapter for Confluent Kafka REST Proxy API — Partition. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/clusters/{cluster-id}/topics/{topic-name}/partitions
      name: clusters-cluster-id-topics-topic-name-partitions
      description: REST surface for clusters-cluster_id-topics-topic_name-partitions.
      operations:
      - method: GET
        name: listpartitions
        description: Apache kafka List Partitions
        call: kafka-rest-proxy-partition.listpartitions
        with:
          cluster_id: rest.cluster_id
          topic_name: rest.topic_name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kafka-rest-proxy-partition-mcp
    port: 9090
    transport: http
    description: MCP adapter for Confluent Kafka REST Proxy API — Partition. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: apache-kafka-list-partitions
      description: Apache kafka List Partitions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kafka-rest-proxy-partition.listpartitions
      with:
        cluster_id: tools.cluster_id
        topic_name: tools.topic_name
      outputParameters:
      - type: object
        mapping: $.
