notes: >-
  Confluent publishes an open-source MCP server (@confluentinc/mcp-confluent) that
  connects AI assistants to Confluent Cloud, Confluent Platform, and standalone Apache
  Kafka deployments with 50+ tools across Kafka, Flink SQL, Schema Registry, Connect,
  and Tableflow. Apache Kafka itself has an in-progress proposal, KIP-1318 (Model
  Context Protocol Server for Apache Kafka). The candidate tools[] below are derived
  from this repo's OpenAPI operations as a governance starting point.
servers:
  - name: mcp-confluent
    maintainer: confluent
    transport: stdio
    package: '@confluentinc/mcp-confluent'
    registry: npm
    url: https://www.npmjs.com/package/@confluentinc/mcp-confluent
    repo: https://github.com/confluentinc/mcp-confluent
    docs: https://docs.confluent.io/cloud/current/ai/ai-tools/open-source-mcp-server.html
    run: npx @confluentinc/mcp-confluent --config ./config.yaml
    access: read-write
    covers: [Kafka, Flink SQL, Schema Registry, Connect, Tableflow]
  - name: confluent-managed-mcp
    maintainer: confluent
    transport: http
    docs: https://docs.confluent.io/cloud/current/ai/ai-tools/managed-mcp-server.html
    access: read-only
    covers: [Confluent Cloud]
proposals:
